<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindSpace | Confessions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #64748b;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animated Background Orbs */
        .orb {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.15;
            transition: background 0.8s ease;
        }

        #app-shell {
            width: 100%;
            max-width: 420px;
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header { text-align: center; margin-bottom: 10px; }
        header h1 { font-weight: 300; letter-spacing: 2px; margin: 0; font-size: 1.8rem; }
        header p { opacity: 0.6; font-size: 0.8rem; margin-top: 5px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; margin-bottom: 15px; display: block; }

        /* Emotion Selector */
        .emotion-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 25px;
        }

        .emotion-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 12px 5px;
            border-radius: 18px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .emotion-item span:first-child { font-size: 1.8rem; margin-bottom: 5px; }
        .emotion-item span:last-child { font-size: 0.65rem; font-weight: 600; opacity: 0.7; }

        .emotion-item.active {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: translateY(-3px);
        }

        /* Input Area */
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }

        textarea:focus { border-color: var(--accent); }

        /* Toggle Options */
        .options-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding: 0 5px;
        }

        .switch-container { display: flex; gap: 10px; }
        .toggle-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle-btn.active {
            background: var(--accent);
            color: var(--bg-color);
            font-weight: 600;
        }

        /* Action Buttons */
        .btn-send {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--accent);
            color: var(--bg-color);
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-send:active { transform: scale(0.98); opacity: 0.9; }
        .btn-send:disabled { opacity: 0.2; cursor: not-allowed; filter: grayscale(1); }

        /* Success Overlay */
        #success-msg {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="orb" id="orb-1" style="top: 10%; left: -10%; background: #3b82f6;"></div>
    <div class="orb" id="orb-2" style="bottom: 10%; right: -10%; background: #a855f7;"></div>

    <div id="app-shell">
        <header>
            <h1>MindSpace</h1>
            <p>Share what's on your mind, safely.</p>
        </header>

        <div class="card">
            <span class="label">Select your mood</span>
            <div class="emotion-grid">
                <div class="emotion-item" onclick="setMood('Happy', '#f59e0b', '#451a03')">
                    <span>😊</span><span>Happy</span>
                </div>
                <div class="emotion-item" onclick="setMood('Sad', '#3b82f6', '#082f49')">
                    <span>😢</span><span>Sad</span>
                </div>
                <div class="emotion-item" onclick="setMood('Angry', '#ef4444', '#450a0a')">
                    <span>😠</span><span>Angry</span>
                </div>
                <div class="emotion-item" onclick="setMood('Calm', '#10b981', '#064e3b')">
                    <span>😌</span><span>Calm</span>
                </div>
            </div>

            <span class="label">Your thoughts</span>
            <textarea id="confession" rows="6" placeholder="Start typing..."></textarea>

            <div class="options-group">
                <span style="font-size: 0.85rem; opacity: 0.7;">Allow comments?</span>
                <div class="switch-container">
                    <button id="opt-no" class="toggle-btn active" onclick="setComments('No')">No</button>
                    <button id="opt-yes" class="toggle-btn" onclick="setComments('Yes')">Yes</button>
                </div>
            </div>

            <button id="send-btn" class="btn-send" disabled onclick="handleSend()">Send Confession</button>
        </div>
    </div>

    <div id="success-msg">
        <div style="font-size: 4rem;">✨</div>
        <h2>Sent into the void</h2>
        <p style="opacity: 0.6;">Your message has been received.</p>
        <button class="toggle-btn" style="margin-top: 30px; padding: 15px 30px;" onclick="location.reload()">Write Another</button>
    </div>

    <script>
        let selectedMood = "";
        let allowComments = "No";

        function setMood(mood, color, darkColor) {
            selectedMood = mood;
            
            // Update CSS Variables for Dynamic Theming
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--bg-color', darkColor);
            
            // Update Active Class
            document.querySelectorAll('.emotion-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.includes(mood)) el.classList.add('active');
            });

            // Update Orbs
            document.getElementById('orb-1').style.background = color;
            
            validate();
        }

        function setComments(val) {
            allowComments = val;
            document.getElementById('opt-yes').classList.toggle('active', val === 'Yes');
            document.getElementById('opt-no').classList.toggle('active', val === 'No');
        }

        const textarea = document.getElementById('confession');
        textarea.addEventListener('input', validate);

        function validate() {
            const btn = document.getElementById('send-btn');
            btn.disabled = !(selectedMood && textarea.value.trim().length > 3);
        }

         function handleSend() {
    const btn = document.getElementById('send-btn');
    const text = textarea.value.trim();
    btn.innerText = "Sending...";
    
    // Your specific Google Form endpoint
    const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeAjECgMa-xcpy0LrZLWwW9GLmk6e7KStAdCm7qBFslchRHnA/formResponse";
    
    const formData = new FormData();
    
    // Mapping your IDs from the provided link
    formData.append("entry.1714490811", selectedMood);   // Mood field
    formData.append("entry.1532578280", text);           // Message field
    formData.append("entry.2052317827", allowComments);  // CommentsAllowed field

    // Sending to Google
    fetch(googleFormUrl, {
        method: "POST",
        mode: "no-cors", // Essential for Google Forms
        body: formData
    }).then(() => {
        // Since we use no-cors, we show success immediately after the request fires
        document.getElementById('success-msg').style.display = 'flex';
        // Optional: clear the textarea for next time
        textarea.value = "";
    }).catch((error) => {
        console.error("Submission Error:", error);
        alert("Failed to reach Google Forms. Check your internet connection.");
        btn.innerText = "Send Confession";
    });
}
        }
    </script>
</body>
</html>
