<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala&display=swap" rel="stylesheet">

<title>Confession Wall</title>

<style>

body {
  margin:0;
  font-family:'Noto Sans Sinhala', sans-serif;
  background:#dcedc8;
  display:flex;
  justify-content:center;
}

/* APP */
.app {
  width:100%;
  max-width:420px;
  min-height:100vh;
  background:#1b5e20;
  color:white;
}

/* HEADER */
.header {
  padding:15px;
  text-align:center;
  font-weight:bold;
  background:#144d18;
}

/* CONTENT */
.content {
  padding:15px;
}

/* EMOTIONS */
.emotions {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:8px;
}

.emotion {
  padding:6px;
  border-radius:20px;
  background:#43a047;
  font-size:12px;
  text-align:center;
  cursor:pointer;
}

.emotion.active {
  background:#a5d6a7;
  color:#1b5e20;
  font-weight:bold;
}

/* TEXTAREA */
textarea {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:15px;
  color:#1b5e20;
  margin-top:10px;
  box-sizing:border-box;
}

/* COUNTER */
.counter {
  font-size:11px;
  text-align:right;
  color:#c8e6c9;
}

/* BUTTONS */
.btn-area {
  text-align:center;
  margin-top:10px;
}

button {
  padding:8px 18px;
  border:none;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
}

.btn-preview { background:#43a047; color:white; }
.btn-send { background:#0d3b12; color:white; }

/* PREVIEW */
.preview {
  display:none;
  background:white;
  color:#1b5e20;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  white-space:pre-wrap;
}

/* COMMENT OPTION */
.comment-box {
  display:none;
  margin-top:10px;
  font-size:13px;
}

/* STATUS */
.status {
  margin-top:10px;
  font-size:13px;
  text-align:center;
  color:#c8e6c9;
}

/* CALM */
.calm {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#1b5e20;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.circle {
  width:80px;
  height:80px;
  border-radius:50%;
  background:#a5d6a7;
  animation:breathe 4s infinite;
}

@keyframes breathe {
  0% { transform:scale(1); }
  50% { transform:scale(1.5); }
  100% { transform:scale(1); }
}

</style>
</head>

<body>

<div class="app">

<div class="header">🌿 Confession Wall</div>

<div class="content">

<p style="font-size:13px;color:#c8e6c9;text-align:center;">
No names. No judgment.
</p>

<p style="margin-top:10px;">I feel...</p>

<div class="emotions">
  <div class="emotion">😔 Sad</div>
  <div class="emotion">😡 Angry</div>
  <div class="emotion">😕 Confused</div>
  <div class="emotion">😞 Tired</div>
  <div class="emotion">😢 Hurt</div>
  <div class="emotion">😶 Empty</div>
  <div class="emotion">😟 Worried</div>
  <div class="emotion">😓 Overwhelmed</div>
  <div class="emotion">😔 Lonely</div>
  <div class="emotion">😶‍🌫️ Numb</div>
  <div class="emotion">😣 Stressed</div>
  <div class="emotion">😌 Relieved</div>
</div>

<textarea id="input" rows="5" placeholder="Write your thoughts..."></textarea>

<div class="counter" id="counter">0</div>

<div class="btn-area">
  <button class="btn-preview" onclick="preview()">Preview</button>
</div>

<div id="previewBox" class="preview"></div>

<!-- COMMENT OPTION -->
<div id="commentOption" class="comment-box">
  <p>Allow comments from group members?</p>
  <label><input type="radio" name="comments" value="Yes"> Yes</label><br>
  <label><input type="radio" name="comments" value="No" checked> No</label>
</div>

<div class="btn-area">
  <button id="sendBtn" class="btn-send" onclick="send()" style="display:none;">Send</button>
</div>

<div id="status" class="status"></div>

</div>

</div>

<!-- CALM -->
<div id="calm" class="calm">
  <div class="circle"></div>
  <p>Your message has been sent 💛</p>
</div>

<script>

let emotion="";

// emotion select
document.querySelectorAll(".emotion").forEach(e=>{
  e.onclick=()=>{
    document.querySelectorAll(".emotion").forEach(x=>x.classList.remove("active"));
    e.classList.add("active");
    emotion=e.innerText;
  }
});

// counter
document.getElementById("input").oninput=function(){
  document.getElementById("counter").innerText=this.value.length;
};

// preview
function preview(){
  let text=document.getElementById("input").value.trim();

  if(text.length<5){
    status("Write a bit more before previewing.");
    return;
  }

  let full=(emotion?emotion+"\n\n":"")+text;

  document.getElementById("previewBox").style.display="block";
  document.getElementById("previewBox").innerText=full;

  document.getElementById("sendBtn").style.display="inline-block";
  document.getElementById("commentOption").style.display="block";

  status("Preview ready. You can send now.");
}

// send
function send(){

  let text=document.getElementById("input").value.trim();
  let commentChoice=document.querySelector('input[name="comments"]:checked').value;

  let full=(emotion?emotion+"\n\n":"")+text +
  "\n\nAllow comments: " + commentChoice;

  status("Your message will be posted anonymously within 24 hours.");

  let fd=new FormData();
  fd.append("message",full);

  fetch("https://formspree.io/f/mjgalprd",{method:"POST",body:fd});

  reset();
  showCalm();
}

// reset
function reset(){
  document.getElementById("input").value="";
  document.getElementById("previewBox").style.display="none";
  document.getElementById("sendBtn").style.display="none";
  document.getElementById("commentOption").style.display="none";
  document.getElementById("counter").innerText="0";

  document.querySelectorAll(".emotion").forEach(x=>x.classList.remove("active"));
  emotion="";
}

// status
function status(msg){
  document.getElementById("status").innerText=msg;
}

// calm
function showCalm(){
  let c=document.getElementById("calm");
  c.style.display="flex";

  setTimeout(()=>{c.style.display="none";},3000);
}

</script>

</body>
</html>
