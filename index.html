<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala&display=swap" rel="stylesheet">

<title>Confession Wall</title>

<style>

/* BACKGROUND */
body {
  margin:0;
  font-family:'Noto Sans Sinhala', sans-serif;
  background:#dcedc8;
  display:flex;
  justify-content:center;
}

/* APP FRAME */
.app {
  width:100%;
  max-width:420px;
  min-height:100vh;
  background:#1b5e20;
  color:white;
  display:flex;
  flex-direction:column;
}

/* HEADER */
.header {
  padding:15px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
  background:#144d18;
  position:sticky;
  top:0;
}

/* CONTENT */
.content {
  padding:15px;
}

/* EMOTIONS */
.emotions {
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:10px;
}

.emotion {
  padding:6px 10px;
  border-radius:20px;
  background:#43a047;
  font-size:12px;
  cursor:pointer;
}

.emotion.active {
  background:#a5d6a7;
  color:#1b5e20;
  font-weight:bold;
}

/* TEXT AREA */
textarea {
  width:100%;
  box-sizing:border-box;
  padding:12px;
  border-radius:12px;
  border:none;
  font-size:15px;
  color:#1b5e20;
  line-height:24px;
  resize:none;
}

/* COUNTER */
.counter {
  text-align:right;
  font-size:11px;
  margin-top:4px;
  color:#c8e6c9;
}

/* BUTTONS */
.btn-area {
  text-align:center;
  margin-top:10px;
}

button {
  padding:8px 18px;
  border:none;
  border-radius:20px;
  font-size:13px;
  cursor:pointer;
}

.btn-preview { background:#43a047; color:white; }
.btn-send { background:#0d3b12; color:white; }

/* PREVIEW */
.preview {
  display:none;
  background:white;
  color:#1b5e20;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  font-size:14px;
  white-space:pre-wrap;
}

/* STATUS */
.status {
  margin-top:10px;
  font-size:13px;
  text-align:center;
  color:#c8e6c9;
}

/* CALM SCREEN */
.calm {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#1b5e20;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.circle {
  width:80px;
  height:80px;
  border-radius:50%;
  background:#a5d6a7;
  animation: breathe 4s infinite;
}

@keyframes breathe {
  0% { transform:scale(1); }
  50% { transform:scale(1.5); }
  100% { transform:scale(1); }
}

</style>
</head>

<body>

<div class="app">

<div class="header"> ✍️ Confession Wall🌿</div>

<div class="content">

<p style="font-size:13px;color:#c8e6c9;text-align:center;">
No names. No judgment.කැමති භාෂාවකින් ලියන්න.
</p>

<!-- EMOTIONS -->
  

<p style="margin-top:10px; font-size:14px; color:#c8e6c9;">
  I feel...
</p>

<div class="emotions">
  <div class="emotion">😔 Sad</div>
  <div class="emotion">😡 Angry</div>
  <div class="emotion">😕 Confused</div>
  <div class="emotion">😞 Tired</div>
  <div class="emotion">😢 Hurt</div>
  <div class="emotion">😶 Empty</div>
  <div class="emotion">😟 Worried</div>
  <div class="emotion">😓 Overwhelmed</div>
  <div class="emotion">😔 Lonely</div>
  <div class="emotion">😶‍🌫️ Numb</div>
  <div class="emotion">😣 Stressed</div>
  <div class="emotion">😌 Relieved</div>
</div>

<textarea id="input" rows="5" placeholder="Write your thoughts..."></textarea>

<div class="counter" id="counter">0</div>

<div class="btn-area">
  <button class="btn-preview" onclick="preview()">Preview</button>
</div>

<div id="previewBox" class="preview"></div>

<div class="btn-area">
  <button id="sendBtn" class="btn-send" onclick="send()" style="display:none;">Send</button>
</div>

<div id="status" class="status"></div>

</div>

</div>

<!-- CALM SCREEN -->
<div id="calm" class="calm">
  <div class="circle"></div>
  <p>You did something important 💛</p>
</div>

<script>

let emotion = "";

// emotion select
document.querySelectorAll(".emotion").forEach(e=>{
  e.onclick=()=>{
    document.querySelectorAll(".emotion").forEach(x=>x.classList.remove("active"));
    e.classList.add("active");
    emotion=e.innerText;
  }
});

// counter
document.getElementById("input").oninput=function(){
  document.getElementById("counter").innerText=this.value.length;
};

// preview
function preview(){
  let text=document.getElementById("input").value.trim();

  if(text.length<5){
    status("Write a bit more");
    return;
  }

  let full=(emotion?emotion+"\n\n":"")+text;

  document.getElementById("previewBox").style.display="block";
  document.getElementById("previewBox").innerText=full;

  document.getElementById("sendBtn").style.display="inline-block";

  status("Ready to send");
}

// send
function send(){

  let text=document.getElementById("input").value.trim();

  if(text.length<5){
    status("Message too short");
    return;
  }

  let full=(emotion?emotion+"\n\n":"")+text;

  status("Your message has been sent. It will be shared anonymously in the group within 24 hours.");

  // send silently
  let fd=new FormData();
  fd.append("message",full);

  fetch("https://formspree.io/f/mjgalprd",{method:"POST",body:fd});

  // reset
  document.getElementById("input").value="";
  document.getElementById("previewBox").style.display="none";
  document.getElementById("sendBtn").style.display="none";
  document.getElementById("counter").innerText="0";

  document.querySelectorAll(".emotion").forEach(x=>x.classList.remove("active"));
  emotion="";

  showCalm();
}

function status(msg){
  document.getElementById("status").innerText=msg;
}

function showCalm(){
  let c=document.getElementById("calm");
  c.style.display="flex";

  setTimeout(()=>{c.style.display="none";},3000);
}

</script>

</body>
</html>
