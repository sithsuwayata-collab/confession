<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Sinhala&display=swap" rel="stylesheet">

<title>Confession Wall</title>

<style>

body {
  margin:0;
  font-family:'Noto Sans Sinhala', sans-serif;
  background:linear-gradient(135deg,#e8f5e9,#c8e6c9);
  display:flex;
  justify-content:center;
}

.app {
  width:100%;
  max-width:420px;
  min-height:100vh;
  padding:15px;
}

.card {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.2);
  border-radius:20px;
  padding:15px;
  box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* HEADER */
.header {
  text-align:center;
}

.logo {
  width:120px;
  display:block;
  margin:0 auto 5px;
}

.title {
  font-size:15px;
  font-weight:bold;
}

/* EMOTIONS */
.emotions {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:8px;
}

.emotion {
  padding:10px;
  border-radius:50%;
  text-align:center;
  cursor:pointer;
  background:rgba(255,255,255,0.3);
  font-size:20px;
  transition:0.2s;
}

.emotion.active {
  background:white;
  transform:scale(1.1);
}

/* TEXT */
textarea {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  margin-top:10px;
  font-size:15px;
  box-sizing:border-box;
}

/* BUTTONS */
.btn-area {
  text-align:center;
  margin-top:10px;
}

button {
  padding:8px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
  font-size:14px;
}

.btn-preview {
  background:#66bb6a;
  color:white;
}

.btn-send {
  background:#1b5e20;
  color:white;
}

/* PREVIEW */
.preview {
  display:none;
  background:white;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  white-space:pre-wrap;
}

/* COMMENT */
.comment-box {
  display:none;
  margin-top:10px;
  font-size:13px;
}

/* CALM SCREEN */
.calm {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(27,94,32,0.95);
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:white;
  text-align:center;
  padding:20px;
}

.circle {
  width:90px;
  height:90px;
  border-radius:50%;
  background:#a5d6a7;
  animation:breathe 4s infinite;
  margin-bottom:15px;
}

@keyframes breathe {
  0% {transform:scale(1);}
  50% {transform:scale(1.5);}
  100% {transform:scale(1);}
}

</style>
</head>

<body>

<div class="app">

<div class="card">

<div class="header">
  <img src="logo.png" class="logo">
  <div class="title">Confession Wall</div>
</div>

<p style="text-align:center;font-size:13px;">
No names. No judgment.
</p>

<p>I feel...</p>

<!-- EMOJIS ONLY -->
<div class="emotions">
  <div class="emotion">😔</div>
  <div class="emotion">😡</div>
  <div class="emotion">😕</div>
  <div class="emotion">😞</div>
  <div class="emotion">😢</div>
  <div class="emotion">😶</div>
  <div class="emotion">😟</div>
  <div class="emotion">😓</div>
  <div class="emotion">😔</div>
  <div class="emotion">😶‍🌫️</div>
  <div class="emotion">😣</div>
  <div class="emotion">😌</div>
</div>

<textarea id="input" rows="5" placeholder="Write your thoughts..."></textarea>

<div class="btn-area">
  <button class="btn-preview" onclick="preview()">Preview</button>
</div>

<div id="previewBox" class="preview"></div>

<div id="commentOption" class="comment-box">
  <p>Allow comments?</p>
  <label><input type="radio" name="comments" value="Yes"> Yes</label><br>
  <label><input type="radio" name="comments" value="No" checked> No</label>
</div>

<div class="btn-area">
  <button id="sendBtn" class="btn-send" onclick="send()" style="display:none;">Send</button>
</div>

</div>

</div>

<!-- CALM SCREEN -->
<div id="calm" class="calm">
  <div class="circle"></div>
  <p>Your message will be shared anonymously within 24 hours.</p>
</div>

<script>

let emotion="";

// select emoji
document.querySelectorAll(".emotion").forEach(e=>{
  e.onclick=()=>{
    document.querySelectorAll(".emotion").forEach(x=>x.classList.remove("active"));
    e.classList.add("active");
    emotion=e.innerText;
  }
});

// preview
function preview(){
  let text=document.getElementById("input").value.trim();

  if(text.length<5){
    alert("Write a bit more.");
    return;
  }

  let full=(emotion?emotion+"\n\n":"")+text;

  document.getElementById("previewBox").style.display="block";
  document.getElementById("previewBox").innerText=full;

  document.getElementById("sendBtn").style.display="inline-block";
  document.getElementById("commentOption").style.display="block";
}

// send
function send(){

  let text=document.getElementById("input").value.trim();
  let comment=document.querySelector('input[name="comments"]:checked').value;

  let full=(emotion?emotion+"\n\n":"")+text+"\n\nAllow comments: "+comment;

  let fd=new FormData();
  fd.append("message",full);

  fetch("https://formspree.io/f/mjgalprd",{method:"POST",body:fd});

  showCalm();
  reset();
}

// reset
function reset(){
  document.getElementById("input").value="";
  document.getElementById("previewBox").style.display="none";
  document.getElementById("sendBtn").style.display="none";
  document.getElementById("commentOption").style.display="none";

  document.querySelectorAll(".emotion").forEach(x=>x.classList.remove("active"));
  emotion="";
}

// calm
function showCalm(){
  let c=document.getElementById("calm");
  c.style.display="flex";

  setTimeout(()=>{
    c.style.display="none";
  },3000);
}

</script>

</body>
</html>
