<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SLC Resilio | MindSpace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Sans+Sinhala:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --accent: #00f2ff;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --success: #00ff88;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Inter', 'Noto Sans Sinhala', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            transition: background 0.8s ease;
        }

        /* Animated Background Orbs */
        .orb {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.15;
            transition: all 0.8s ease;
        }

        #app-shell {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-weight: 600; letter-spacing: 1px; margin: 0; font-size: 1.8rem; color: var(--accent); }
        header p { opacity: 0.6; font-size: 0.85rem; margin-top: 5px; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; margin-bottom: 12px; display: block; }

        /* Emotion Selector */
        .emotion-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .emotion-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 12px 5px;
            border-radius: 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .emotion-item span:first-child { font-size: 1.8rem; margin-bottom: 5px; transition: transform 0.3s ease; }
        .emotion-item span:last-child { font-size: 0.65rem; font-weight: 600; opacity: 0.7; }

        .emotion-item:active { transform: scale(0.95); }
        
        .emotion-item.active {
            background: rgba(255,255,255,0.1);
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            transform: translateY(-2px);
        }
        .emotion-item.active span:first-child { transform: scale(1.2); }

        /* Input Area */
        textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 18px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        textarea:focus { border-color: var(--accent); background: rgba(0,0,0,0.4); }

        /* Toggle Options */
        .options-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .switch-container { display: flex; gap: 8px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 12px; }
        .toggle-btn {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .toggle-btn.active {
            background: var(--accent);
            color: #000;
            font-weight: 700;
            box-shadow: 0 2px 10px var(--accent);
        }

        /* Send Button - 3D Pop Effect */
        .btn-send {
            width: 100%;
            padding: 18px;
            border-radius: 20px;
            border: none;
            background: var(--accent);
            color: #000;
            font-weight: 800;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 #008ba3; /* Darker bottom for 3D */
        }

        .btn-send:active { 
            transform: translateY(2px);
            box-shadow: 0 2px 0 #008ba3; 
        }

        .btn-send:disabled { 
            background: #1e293b; 
            color: #475569; 
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }

        /* Success Screen */
        #success-msg {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .trial-tag { font-size: 0.65rem; opacity: 0.4; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="orb" id="orb-1" style="top: -10%; left: -10%; background: var(--accent);"></div>
    <div class="orb" id="orb-2" style="bottom: -10%; right: -10%; background: #a855f7;"></div>

    <div id="app-shell">
        <header>
            <h1>MindSpace</h1>
            <p>SLC Resilio Trial Version</p>
        </header>

        <div class="card">
            <span class="label">How do you feel?</span>
            <div class="emotion-grid">
                <div class="emotion-item" onclick="setMood('Happy', '#00f2ff', '#0f172a')">
                    <span>😊</span><span>Happy</span>
                </div>
                <div class="emotion-item" onclick="setMood('Sad', '#3b82f6', '#020617')">
                    <span>😢</span><span>Sad</span>
                </div>
                <div class="emotion-item" onclick="setMood('Angry', '#ff4d4d', '#1a0505')">
                    <span>😠</span><span>Angry</span>
                </div>
                <div class="emotion-item" onclick="setMood('Calm', '#00ff88', '#051a10')">
                    <span>😌</span><span>Calm</span>
                </div>
            </div>

            <span class="label">Your thoughts</span>
            <textarea id="confession" rows="5" placeholder="What's on your mind?"></textarea>

            <div class="options-group">
                <span style="font-size: 0.85rem; opacity: 0.7;">Allow comments?</span>
                <div class="switch-container">
                    <button id="opt-no" class="toggle-btn active" onclick="setComments('No')">No</button>
                    <button id="opt-yes" class="toggle-btn" onclick="setComments('Yes')">Yes</button>
                </div>
            </div>

            <button id="send-btn" class="btn-send" disabled onclick="handleSend()">Send Confession</button>
            
            <center class="trial-tag">
                Your feedback valued: <a href="https://forms.gle/PbqqLNAnEfXLQZNAA" style="color:var(--accent)">Send Feedback</a>
            </center>
        </div>
    </div>

    <div id="success-msg">
        <div style="font-size: 5rem; margin-bottom: 20px;">✨</div>
        <h2 style="color:var(--accent)">Sent Successfully</h2>
        <p style="opacity: 0.6; text-align: center;">Your thoughts have been safely delivered to the SLC Resilio database.</p>
        <button class="btn-send" style="width: auto; padding: 15px 40px; margin-top: 30px;" onclick="location.reload()">Write Another</button>
    </div>

    <script>
        let selectedMood = "";
        let allowComments = "No";
        const textarea = document.getElementById('confession');
        const sendBtn = document.getElementById('send-btn');

        function setMood(mood, color, darkColor) {
            selectedMood = mood;
            
            // Update Visual Theme
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--bg-color', darkColor);
            
            // Toggle Active UI
            document.querySelectorAll('.emotion-item').forEach(el => {
                el.classList.remove('active');
                if(el.innerText.includes(mood)) el.classList.add('active');
            });

            validate();
        }

        function setComments(val) {
            allowComments = val;
            document.getElementById('opt-yes').classList.toggle('active', val === 'Yes');
            document.getElementById('opt-no').classList.toggle('active', val === 'No');
        }

        textarea.addEventListener('input', validate);

        function validate() {
            // Button activates ONLY IF mood is selected AND message is 4+ characters
            if (selectedMood !== "" && textarea.value.trim().length >= 4) {
                sendBtn.disabled = false;
            } else {
                sendBtn.disabled = true;
            }
        }

        function handleSend() {
            sendBtn.disabled = true;
            sendBtn.innerText = "Processing...";
            
            const googleFormUrl = "https://docs.google.com/forms/d/e/1FAIpQLSeAjECgMa-xcpy0LrZLWwW9GLmk6e7KStAdCm7qBFslchRHnA/formResponse";
            
            const formData = new FormData();
            // Google Entry IDs provided by user
            formData.append("entry.1714490811", selectedMood);
            formData.append("entry.1532578280", textarea.value.trim());
            formData.append("entry.2052317827", allowComments);

            fetch(googleFormUrl, {
                method: "POST",
                mode: "no-cors", 
                body: formData
            }).then(() => {
                document.getElementById('success-msg').style.display = 'flex';
            }).catch((error) => {
                alert("Network error. Please check your connection.");
                sendBtn.disabled = false;
                sendBtn.innerText = "Send Confession";
            });
        }
    </script>
</body>
</html>
